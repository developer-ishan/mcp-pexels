name: Feature request
description: Suggest an improvement or new capability for mcp-pexels.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain point or workflow that this would unlock.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like mcp-pexels to behave? Sketch the tool name / input shape if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you could solve this — workarounds, other tools, etc.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to Pexels API docs, screenshots, related issues.
